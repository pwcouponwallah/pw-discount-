<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>PW Discount Access | Yugal (PW Ambassador)</title>
  <!-- Google Fonts & Select2 CSS -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f5f7fc 0%, #eef2f8 100%);
      min-height: 100vh;
      padding: 2rem 1rem;
      color: #1e293b;
    }

    .main-card {
      max-width: 650px;
      margin: 0 auto;
      background: white;
      border-radius: 2rem;
      box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .hero {
      background: linear-gradient(105deg, #0f172a 0%, #1e293b 100%);
      padding: 2rem 2rem 1.8rem;
      text-align: center;
      color: white;
    }

    .hero-badge {
      display: inline-block;
      background: rgba(34, 197, 94, 0.2);
      backdrop-filter: blur(4px);
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #86efac;
      margin-bottom: 1rem;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .hero h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.3;
    }

    .hero-highlight {
      color: #facc15;
    }

    .hero p {
      margin-top: 0.75rem;
      opacity: 0.85;
      font-size: 0.95rem;
    }

    .form-content {
      padding: 2rem;
    }

    .step-progress {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2rem;
      position: relative;
    }

    .step {
      flex: 1;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 500;
      color: #94a3b8;
      position: relative;
      z-index: 2;
      background: white;
    }

    .step.active {
      color: #22c55e;
      font-weight: 600;
    }

    .step span {
      display: inline-block;
      width: 28px;
      height: 28px;
      background: #e2e8f0;
      border-radius: 50%;
      line-height: 28px;
      font-size: 0.8rem;
      margin-bottom: 6px;
      color: #475569;
    }

    .step.active span {
      background: #22c55e;
      color: white;
    }

    .form-step {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .form-step.active-step {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px);}
      to { opacity: 1; transform: translateY(0);}
    }

    .input-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: #334155;
    }

    input, select {
      width: 100%;
      padding: 0.9rem 1rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 1rem;
      font-size: 1rem;
      transition: all 0.2s;
      background: #fefefe;
      font-family: 'Inter', sans-serif;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.2);
    }

    .radio-group {
      display: flex;
      gap: 1rem;
      margin-top: 0.5rem;
    }

    .radio-card {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 1rem;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: white;
    }

    .radio-card.selected {
      border-color: #22c55e;
      background: #f0fdf4;
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.1);
    }

    .radio-card input {
      display: none;
    }

    .radio-card strong {
      display: block;
      font-size: 1rem;
    }

    .radio-card small {
      font-size: 0.7rem;
      color: #64748b;
    }

    .btn-group {
      display: flex;
      justify-content: space-between;
      margin-top: 2rem;
    }

    button {
      padding: 0.9rem 1.8rem;
      border: none;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: #22c55e;
      color: white;
      box-shadow: 0 4px 8px rgba(34, 197, 94, 0.3);
    }

    .btn-primary:hover {
      background: #16a34a;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #334155;
    }

    .btn-secondary:hover {
      background: #e2e8f0;
    }

    .toast-msg {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      font-size: 0.85rem;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }

    footer {
      text-align: center;
      font-size: 0.7rem;
      padding: 1.5rem;
      border-top: 1px solid #eef2f8;
      color: #94a3b8;
    }

    /* Select2 Overrides */
    .select2-container--default .select2-selection--single {
      border: 1.5px solid #e2e8f0;
      border-radius: 1rem;
      height: 52px;
      padding: 0.5rem;
    }

    .select2-container--default .select2-selection--single .select2-selection__rendered {
      line-height: 40px;
      font-size: 0.95rem;
    }

    .select2-dropdown {
      border-radius: 1rem;
      border-color: #e2e8f0;
    }

    @media (max-width: 480px) {
      .form-content { padding: 1.5rem; }
      .hero h1 { font-size: 1.4rem; }
      .radio-group { flex-direction: column; }
    }

    .hidden-field {
      display: none;
    }
  </style>
</head>
<body>

<div class="main-card">
  <div class="hero">
    <div class="hero-badge">🎯 Verified PW Ambassador — Yugal</div>
    <h1>Unlock Maximum <span class="hero-highlight">₹5000 OFF</span><br>on PW Batches</h1>
    <p>JEE · NEET · UPSC · GATE · SSC · Offline Centers</p>

  <div class="form-content">
    <div class="step-progress">

    <form id="leadForm">
      <!-- STEP 1 - Basic Info -->
      <div class="form-step active-step" id="step1">

          <input type="text" id="fullName" placeholder="e.g., Rohan Sharma" required>
        </div>
        <div class="input-group">
          <label>Email ID *</label>
          <input type="email" id="email" placeholder="you@example.com" required>
        </div>
        <div class="input-group">
          <label>WhatsApp Number *</label>
          <input type="tel" id="phone" placeholder="9876543210" required>
        </div>
        <div class="btn-group">
          <button type="button" class="btn-primary" id="nextStep1">Continue →</button>
        </div>
      </div>

      <!-- STEP 2 - Mode Selection -->
      <div class="form-step" id="step2">
        <div class="input-group">
          <label>Select Batch Mode *</label>
          <div class="radio-group" id="modeRadios">
            <div class="radio-card" data-mode="online">
              <input type="radio" name="batchMode" value="online" id="modeOnline">
              <strong>📱 Online Batch</strong>
              <small>Live + Recorded</small>

            <div class="radio-card" data-mode="offline">

          <button type="button" class="btn-secondary" id="prevStep2">← Back</button>
          <button type="button" class="btn-primary" id="nextStep2">Continue →</button>
        </div>
      </div>

      <!-- STEP 3 - Summary + Submission -->
      <div class="form-step" id="step3">
        <div id="summaryPreview" style="background:#f8fafc; padding:1rem; border-radius:1rem; margin-bottom:1rem;"></div>
        <div class="btn-group">
          <button type="button" class="btn-secondary" id="prevStep3">← Back</button>
          <button type="button" class="btn-primary" id="submitLead">✔ Get Discount →</button>
        </div>
      </div>
    </form>
    <footer>⚡ Offer valid for new users | Coupon auto-delivered via email</footer>
  </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<!-- jQuery & Select2 -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbzrp71aPEiKf0L4LaTaOg0-byg3bKX8sDjLxSo3ZeDgf_40n3N8rdxtE1fVC8MdmzHA/exec';
  
  let selectedMode = null;
  let currentStep = 1;
  let centerSelect2 = null;

  function showStep(step) {
    document.querySelectorAll('.form-step').forEach((el, idx) => {
      el.classList.remove('active-step');
      if(idx+1 === step) el.classList.add('active-step');
    });
    for(let i=1; i<=3; i++) {
      const ind = document.getElementById(`step${i}Indicator`);
      if(i <= step) ind.classList.add('active');
      else ind.classList.remove('active');
    }
    currentStep = step;
  }

  // Handle mode card selection
  document.querySelectorAll('.radio-card').forEach(card => {
    card.addEventListener('click', function() {
      document.querySelectorAll('.radio-card').forEach(c => c.classList.remove('selected'));
      this.classList.add('selected');
      const radio = this.querySelector('input');
      if(radio) radio.checked = true;
      selectedMode = radio.value;
      generateDynamicFields(selectedMode);
    });
  });

  function generateDynamicFields(mode) {

            "Srinagar - Baghat Vidyapeeth", "Srinagar - Rajbagh Vidyapeeth", "Surat - Adajan Vidyapeeth",
            "Surat - Katargram Vidyapeeth", "Surat - Vesu Vidyapeeth", "Udaipur Vidyapeeth",
            "Vadodara - Alkapuri Vidyapeeth", "Vadodara - Manjalpur Vidyapeeth", "Vadodara - Sama Savli Vidyapeeth",
            "Varanasi - BHU Vidyapeeth", "Varanasi - Bhojuveer Vidyapeeth", "Vijayawada Vidyapeeth",
            "Vizag Vidyapeeth", "Other / Not Listed"

          jQuery('#offlineCenter').select2({
            placeholder: "🔍 Search for your city or center...",
            allowClear: true,
            width: '100%',
            data: centers.map(c => ({ id: c, text: c }))
          });
          centerSelect2 = true;
        }
      }, 100);
    }
  }

  document.getElementById('nextStep1').addEventListener('click', () => {
    const name = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    if(!name || !email || !phone) {
      showToast('Please fill all basic details', '#ef4444');
      return;
    }
    if(!email.includes('@')) {
      showToast('Enter valid email', '#ef4444');
      return;
    }
    showStep(2);
  });

  document.getElementById('prevStep2').addEventListener('click', () => showStep(1));
  document.getElementById('prevStep3').addEventListener('click', () => showStep(2));

  document.getElementById('nextStep2').addEventListener('click', () => {
    const modeRadio = document.querySelector('input[name="batchMode"]:checked');
    if(!modeRadio) {
      showToast('Please select Online or Offline mode', '#ef4444');
      return;
    }
    const dynamicValid = validateDynamicFields(selectedMode);
    if(!dynamicValid) return;

    const name = document.getElementById('fullName').value;
    const email = document.getElementById('email').value;
    let detailsHtml = `<strong>👤 ${name}</strong><br>📧 ${email}<br>📱 ${document.getElementById('phone').value}<br>🎓 Mode: ${selectedMode.toUpperCase()}<br>`;
    if(selectedMode === 'online') {
      const course = document.getElementById('courseType')?.value || 'Not specified';
      detailsHtml += `📚 Target: ${course}<br>✨ Coupon will be shared on email.`;
    } else {
      const batchType = document.getElementById('batchType')?.value;
      const batchTypeText = batchType === 'vidyapeeth' ? 'Vidyapeeth (Regular)' : (batchType === 'powerbatch' ? 'Power Batch (Crash Course)' : 'Not specified');
      detailsHtml += `📦 Batch Type: ${batchTypeText}<br>`;
      if(batchType !== 'powerbatch') {
        const center = jQuery('#offlineCenter').val() || 'Not selected';
        detailsHtml += `📍 Center: ${center}<br>`;
      }
      detailsHtml += `🏫 Team will share offline discount form.`;
    }
    document.getElementById('summaryPreview').innerHTML = detailsHtml;
    showStep(3);
  });

  function validateDynamicFields(mode) {
    if(mode === 'online') {
      const course = document.getElementById('courseType');
      if(!course || !course.value) {
        showToast('Please select your target exam', '#ef4444');
        return false;
      }
    } else if (mode === 'offline') {
      const batchType = document.getElementById('batchType');
      if(!batchType || !batchType.value) {
        showToast('Please select batch type', '#ef4444');
        return false;
      }
      if(batchType.value === 'vidyapeeth') {
        const center = jQuery('#offlineCenter').val();
        if(!center) {
          showToast('Please select a center preference', '#ef4444');
          return false;
        }
      }
    }
    return true;
  }

  document.getElementById('submitLead').addEventListener('click', async () => {
    const submitBtn = document.getElementById('submitLead');
    submitBtn.innerText = 'Processing...';
    submitBtn.disabled = true;

    const name = document.getElementById('fullName').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    let course = '';
    let center = '';
    let batchType = '';

    if(selectedMode === 'online') {
      course = document.getElementById('courseType')?.value || '';
    } else {
      batchType = document.getElementById('batchType')?.value || '';
      if(batchType === 'vidyapeeth') {
        center = jQuery('#offlineCenter').val() || '';
      } else {
        center = 'Power Batch (No specific center)';
      }
    }

    const payload = {
      name, email, phone,
      mode: selectedMode,
      course: course,
      center: center,
      batchType: batchType,
      timestamp: new Date().toISOString()
    };

    try {
      await fetch(API_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      showToast('✅ Success! Check your email for coupon details.', '#22c55e');
      document.getElementById('leadForm').reset();
      setTimeout(() => {
        window.location.reload();
      }, 2000);
    } catch (err) {
      console.error(err);
      showToast('Network error, please try again', '#ef4444');
      submitBtn.innerText = 'Retry →';
      submitBtn.disabled = false;
    }
  });

  function showToast(msg, bgColor = '#1e293b') {
    const toast = document.getElementById('toastMsg');
    toast.style.backgroundColor = bgColor;
    toast.innerText = msg;
    toast.style.opacity = '1';
    setTimeout(() => { toast.style.opacity = '0'; }, 3000);
  }
</script>
</body>
</html>
