<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>PW Ambassador Admin | Yugal - Advanced Lead Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <!-- PDF Generation Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <!-- Chart.js for Analytics -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 100%);
      padding: 1rem;
      color: #e2e8f0;
      min-height: 100vh;
    }

    .dashboard-container {
      max-width: 1600px;
      margin: 0 auto;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(10px);
      border-radius: 1.5rem;
      border: 1px solid rgba(71, 85, 105, 0.5);
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    /* Header */
    .dashboard-header {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      padding: 1.5rem 2rem;
      border-bottom: 1px solid #334155;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    h1 i {
      color: #22c55e;
      font-size: 1.8rem;
    }

    .badge-ambassador {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      padding: 0.3rem 0.8rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      color: white;
    }

    .last-updated {
      font-size: 0.75rem;
      color: #94a3b8;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .stat-card {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(5px);
      padding: 1rem;
      border-radius: 1rem;
      border-left: 3px solid #22c55e;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      border-color: #22c55e;
      box-shadow: 0 8px 25px -8px rgba(34, 197, 94, 0.3);
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #94a3b8;
      margin-bottom: 0.3rem;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 800;
      color: white;
    }

    /* Tabs */
    .tabs-container {
      padding: 0 2rem;
      border-bottom: 1px solid #334155;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: transparent;
      border: none;
      padding: 0.8rem 1.5rem;
      color: #94a3b8;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
      font-family: 'Inter', sans-serif;
    }

    .tab-btn:hover {
      color: #22c55e;
    }

    .tab-btn.active {
      color: #22c55e;
      border-bottom-color: #22c55e;
    }

    /* Filters Bar */
    .filters-bar {
      background: rgba(15, 23, 42, 0.6);
      padding: 1rem 2rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      justify-content: space-between;
    }

    .filters-left {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #0f172a;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      border: 1px solid #334155;
    }

    .filter-group label {
      font-size: 0.75rem;
      font-weight: 500;
      color: #94a3b8;
    }

    select, .filter-group input {
      background: transparent;
      border: none;
      color: white;
      font-size: 0.8rem;
      padding: 0.25rem;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
    }

    select:focus, .filter-group input:focus {
      outline: none;
    }

    select option {
      background: #1e293b;
    }

    .btn {
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      border: none;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
    }

    .btn-secondary {
      background: #334155;
      color: #e2e8f0;
    }

    .btn-secondary:hover {
      background: #475569;
    }

    .btn-warning {
      background: #facc15;
      color: #0f172a;
    }

    /* Tables Container */
    .tables-container {
      padding: 2rem;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .section-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #22c55e;
      display: inline-block;
    }

    .sub-section {
      margin-bottom: 2rem;
    }

    .sub-section h3 {
      font-size: 1rem;
      color: #94a3b8;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .table-wrapper {
      overflow-x: auto;
      margin-bottom: 2rem;
      border-radius: 0.75rem;
      background: #0f172a;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    .data-table th {
      text-align: left;
      padding: 0.75rem;
      background: #1e293b;
      color: #94a3b8;
      font-weight: 600;
      border-bottom: 1px solid #334155;
    }

    .data-table td {
      padding: 0.75rem;
      border-bottom: 1px solid rgba(51, 65, 85, 0.5);
    }

    .data-table tr:hover {
      background: rgba(34, 197, 94, 0.05);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.2rem 0.6rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .status-sent {
      background: rgba(34, 197, 94, 0.2);
      color: #86efac;
    }

    .status-pending {
      background: rgba(250, 204, 21, 0.2);
      color: #fde047;
    }

    /* Chart Container */
    .chart-container {
      background: #0f172a;
      padding: 1rem;
      border-radius: 1rem;
      margin-bottom: 2rem;
    }

    canvas {
      max-height: 300px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 3rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #334155;
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #1e293b;
      border-left: 4px solid #22c55e;
      padding: 0.75rem 1.2rem;
      border-radius: 0.75rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
      z-index: 1100;
      animation: slideInRight 0.3s ease;
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(100px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @media (max-width: 768px) {
      .dashboard-header { padding: 1rem; }
      .filters-bar { padding: 0.75rem 1rem; flex-direction: column; }
      .filters-left { width: 100%; justify-content: space-between; }
      .tables-container { padding: 1rem; }
      .data-table th, .data-table td { padding: 0.5rem; font-size: 0.7rem; }
      .stat-value { font-size: 1.3rem; }
      .tabs-container { padding: 0 1rem; }
      .tab-btn { padding: 0.5rem 1rem; font-size: 0.75rem; }
    }

    /* PDF Export Styles */
    @media print {
      body {
        background: white;
        padding: 0;
        margin: 0;
      }
      .dashboard-container {
        background: white;
        box-shadow: none;
      }
      .btn, .filters-bar, .tabs-container, .chart-container {
        display: none;
      }
      .tab-content {
        display: block !important;
      }
      .data-table {
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>

<div class="dashboard-container">
  <div class="dashboard-header">
    <div class="header-top">
      <h1>
        <i class="fas fa-crown"></i>
        Yugal's PW Ambassador Suite
        <span class="badge-ambassador"><i class="fas fa-shield-alt"></i> Admin Pro</span>
      </h1>
      <div class="last-updated" id="lastUpdated">
        <i class="fas fa-sync-alt"></i> Last sync: --
      </div>
    </div>
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-label"><i class="fas fa-users"></i> TOTAL LEADS</div><div class="stat-value" id="totalLeads">0</div></div>
      <div class="stat-card"><div class="stat-label"><i class="fas fa-mobile-alt"></i> ONLINE</div><div class="stat-value" id="onlineCount">0</div></div>
      <div class="stat-card"><div class="stat-label"><i class="fas fa-building"></i> OFFLINE</div><div class="stat-value" id="offlineCount">0</div></div>
      <div class="stat-card"><div class="stat-label"><i class="fas fa-school"></i> VIDYAPEETH</div><div class="stat-value" id="vidyapeethCount">0</div></div>
      <div class="stat-card"><div class="stat-label"><i class="fas fa-bolt"></i> POWER BATCH</div><div class="stat-value" id="powerBatchCount">0</div></div>
      <div class="stat-card"><div class="stat-label"><i class="fas fa-envelope"></i> EMAILS SENT</div><div class="stat-value" id="emailedCount">0</div></div>
    </div>
  </div>

  <div class="filters-bar">
    <div class="filters-left">
      <div class="filter-group">
        <label><i class="fas fa-calendar"></i> Date From:</label>
        <input type="date" id="dateFrom">
      </div>
      <div class="filter-group">
        <label><i class="fas fa-calendar"></i> Date To:</label>
        <input type="date" id="dateTo">
      </div>
      <div class="filter-group">
        <label><i class="fas fa-search"></i> Search:</label>
        <input type="text" id="searchInput" placeholder="Name/Email/Phone">
      </div>
    </div>
    <div style="display: flex; gap: 0.5rem; flex-wrap: wrap;">
      <button id="refreshBtn" class="btn btn-primary"><i class="fas fa-sync-alt"></i> Refresh</button>
      <button id="exportPdfBtn" class="btn btn-warning"><i class="fas fa-file-pdf"></i> Export PDF Report</button>
      <button id="exportCsvBtn" class="btn btn-secondary"><i class="fas fa-download"></i> Export CSV</button>
    </div>
  </div>

  <div class="tabs-container">
    <button class="tab-btn active" data-tab="overview"><i class="fas fa-chart-pie"></i> Overview</button>
    <button class="tab-btn" data-tab="online"><i class="fas fa-mobile-alt"></i> Online Batches</button>
    <button class="tab-btn" data-tab="offline"><i class="fas fa-building"></i> Offline Batches</button>
    <button class="tab-btn" data-tab="all"><i class="fas fa-table"></i> All Leads</button>
  </div>

  <div class="tables-container">
    <!-- Overview Tab -->
    <div id="overviewTab" class="tab-content active">
      <div class="chart-container">
        <canvas id="modeChart"></canvas>
      </div>
      <div class="chart-container">
        <canvas id="courseChart"></canvas>
      </div>
    </div>

    <!-- Online Batches Tab -->
    <div id="onlineTab" class="tab-content">
      <div class="sub-section">
        <h3><i class="fas fa-graduation-cap"></i> Course-wise Breakdown</h3>
        <div id="onlineCourseTables"></div>
      </div>
    </div>

    <!-- Offline Batches Tab -->
    <div id="offlineTab" class="tab-content">
      <div class="sub-section">
        <h3><i class="fas fa-school"></i> Vidyapeeth (Regular Program)</h3>
        <div class="table-wrapper" id="vidyapeethTable"></div>
      </div>
      <div class="sub-section">
        <h3><i class="fas fa-bolt"></i> Power Batch (Crash Course)</h3>
        <div class="table-wrapper" id="powerBatchTable"></div>
      </div>
    </div>

    <!-- All Leads Tab -->
    <div id="allTab" class="tab-content">
      <div class="table-wrapper">
        <table class="data-table" id="allLeadsTable">
          <thead>
            <tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th><th>Parent Mobile</th><th>Mode</th><th>Course/Center</th><th>Batch Type</th><th>Timestamp</th><th>Email Status</th></tr>
          </thead>
          <tbody id="allLeadsBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
  const API_BASE = 'https://script.google.com/macros/s/AKfycbwyV6rSHkkqaE502u97qqBumrMT0PkbfARtvVqDTiGuwdGTSAUs63tySTViM1xOG31x/exec';
  let allLeads = [];
  let modeChart = null;
  let courseChart = null;

  // Helper Functions
  function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  function filterByDate(leads) {
    const fromDate = document.getElementById('dateFrom').value;
    const toDate = document.getElementById('dateTo').value;
    if (!fromDate && !toDate) return leads;
    
    return leads.filter(lead => {
      const leadDate = new Date(lead["Timestamp"] || lead["timestamp"]);
      if (fromDate && leadDate < new Date(fromDate)) return false;
      if (toDate && leadDate > new Date(toDate)) return false;
      return true;
    });
  }

  function filterBySearch(leads) {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    if (!searchTerm) return leads;
    
    return leads.filter(lead => {
      const name = (lead["Full Name"] || lead["name"] || '').toLowerCase();
      const email = (lead["Email"] || lead["email"] || '').toLowerCase();
      const phone = (lead["Phone"] || lead["phone"] || '').toLowerCase();
      return name.includes(searchTerm) || email.includes(searchTerm) || phone.includes(searchTerm);
    });
  }

  async function fetchLeads() {
    try {
      const response = await fetch(`${API_BASE}?mode=all`);
      const leads = await response.json();
      allLeads = Array.isArray(leads) ? leads : [];
      
      renderStats(allLeads);
      renderOverviewCharts(allLeads);
      renderOnlineTables(allLeads);
      renderOfflineTables(allLeads);
      renderAllLeadsTable(allLeads);
      
      document.getElementById('lastUpdated').innerHTML = `<i class="fas fa-sync-alt"></i> Last sync: ${new Date().toLocaleString()}`;
    } catch (error) {
      console.error('Error fetching leads:', error);
      showToast('Failed to fetch leads: ' + error.message, 'error');
    }
  }

  function renderStats(leads) {
    const filtered = filterBySearch(filterByDate(leads));
    const total = filtered.length;
    const onlineCount = filtered.filter(l => (l["Mode (Online/Offline)"] || l["mode"]) === 'online').length;
    const offlineCount = total - onlineCount;
    const vidyapeethCount = filtered.filter(l => (l["Batch Type"] || l["batchType"]) === 'vidyapeeth').length;
    const powerBatchCount = filtered.filter(l => (l["Batch Type"] || l["batchType"]) === 'powerbatch').length;
    const emailedCount = filtered.filter(l => (l["Email Sent"] || l["emailSent"]) === 'SENT').length;
    
    document.getElementById('totalLeads').innerHTML = total;
    document.getElementById('onlineCount').innerHTML = onlineCount;
    document.getElementById('offlineCount').innerHTML = offlineCount;
    document.getElementById('vidyapeethCount').innerHTML = vidyapeethCount;
    document.getElementById('powerBatchCount').innerHTML = powerBatchCount;
    document.getElementById('emailedCount').innerHTML = emailedCount;
  }

  function renderOverviewCharts(leads) {
    const filtered = filterBySearch(filterByDate(leads));
    const onlineCount = filtered.filter(l => (l["Mode (Online/Offline)"] || l["mode"]) === 'online').length;
    const offlineCount = filtered.length - onlineCount;
    
    // Mode Chart
    const modeCtx = document.getElementById('modeChart').getContext('2d');
    if (modeChart) modeChart.destroy();
    modeChart = new Chart(modeCtx, {
      type: 'doughnut',
      data: {
        labels: ['Online Batches', 'Offline Batches'],
        datasets: [{
          data: [onlineCount, offlineCount],
          backgroundColor: ['#22c55e', '#3b82f6'],
          borderWidth: 0
        }]
      },
      options: { responsive: true, plugins: { legend: { position: 'bottom', labels: { color: '#e2e8f0' } } } }
    });
    
    // Course Chart (Online only)
    const onlineLeads = filtered.filter(l => (l["Mode (Online/Offline)"] || l["mode"]) === 'online');
    const courseCounts = {};
    onlineLeads.forEach(lead => {
      const course = lead["Course/Target"] || lead["course"] || 'Not Specified';
      courseCounts[course] = (courseCounts[course] || 0) + 1;
    });
    
    const courseCtx = document.getElementById('courseChart').getContext('2d');
    if (courseChart) courseChart.destroy();
    courseChart = new Chart(courseCtx, {
      type: 'bar',
      data: {
        labels: Object.keys(courseCounts),
        datasets: [{
          label: 'Number of Students',
          data: Object.values(courseCounts),
          backgroundColor: '#22c55e',
          borderRadius: 8
        }]
      },
      options: { responsive: true, plugins: { legend: { labels: { color: '#e2e8f0' } } }, scales: { y: { ticks: { color: '#e2e8f0' } }, x: { ticks: { color: '#e2e8f0', rotation: 45 } } } }
    });
  }

  function renderOnlineTables(leads) {
    const filtered = filterBySearch(filterByDate(leads));
    const onlineLeads = filtered.filter(l => (l["Mode (Online/Offline)"] || l["mode"]) === 'online');
    
    const courseGroups = {};
    onlineLeads.forEach(lead => {
      const course = lead["Course/Target"] || lead["course"] || 'Not Specified';
      if (!courseGroups[course]) courseGroups[course] = [];
      courseGroups[course].push(lead);
    });
    
    const container = document.getElementById('onlineCourseTables');
    container.innerHTML = '';
    
    for (const [course, students] of Object.entries(courseGroups)) {
      const tableHtml = `
        <div class="sub-section">
          <h3><i class="fas fa-book-open"></i> ${course} (${students.length} students)</h3>
          <div class="table-wrapper">
            <table class="data-table">
              <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Timestamp</th><th>Status</th></tr></thead>
              <tbody>
                ${students.map(s => `
                  <tr>
                    <td>${escapeHtml(s["Full Name"] || s["name"] || '-')}</td>
                    <td>${escapeHtml(s["Email"] || s["email"] || '-')}</td>
                    <td>${escapeHtml(s["Phone"] || s["phone"] || '-')}</td>
                    <td>${escapeHtml(s["Timestamp"] || s["timestamp"] || '-')}</td>
                    <td><span class="status-badge ${(s["Email Sent"] || s["emailSent"]) === 'SENT' ? 'status-sent' : 'status-pending'}">${(s["Email Sent"] || s["emailSent"]) === 'SENT' ? '✓ Sent' : '⏳ Pending'}</span></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
      container.innerHTML += tableHtml;
    }
    
    if (onlineLeads.length === 0) {
      container.innerHTML = '<p style="text-align:center; padding:2rem; color:#64748b;">No online leads found</p>';
    }
  }

  function renderOfflineTables(leads) {
    const filtered = filterBySearch(filterByDate(leads));
    const offlineLeads = filtered.filter(l => (l["Mode (Online/Offline)"] || l["mode"]) === 'offline');
    
    const vidyapeethLeads = offlineLeads.filter(l => (l["Batch Type"] || l["batchType"]) === 'vidyapeeth');
    const powerBatchLeads = offlineLeads.filter(l => (l["Batch Type"] || l["batchType"]) === 'powerbatch');
    
    // Vidyapeeth Table
    const vidyapeethContainer = document.getElementById('vidyapeethTable');
    vidyapeethContainer.innerHTML = `
      <table class="data-table">
        <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Parent Mobile</th><th>Center</th><th>Timestamp</th><th>Status</th></tr></thead>
        <tbody>
          ${vidyapeethLeads.map(s => `
            <tr>
              <td>${escapeHtml(s["Full Name"] || s["name"] || '-')}</td>
              <td>${escapeHtml(s["Email"] || s["email"] || '-')}</td>
              <td>${escapeHtml(s["Phone"] || s["phone"] || '-')}</td>
              <td>${escapeHtml(s["Parent Mobile"] || s["parentMobile"] || '-')}</td>
              <td>${escapeHtml(s["Center Preference"] || s["center"] || '-')}</td>
              <td>${escapeHtml(s["Timestamp"] || s["timestamp"] || '-')}</td>
              <td><span class="status-badge ${(s["Email Sent"] || s["emailSent"]) === 'SENT' ? 'status-sent' : 'status-pending'}">${(s["Email Sent"] || s["emailSent"]) === 'SENT' ? '✓ Sent' : '⏳ Pending'}</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    
    // Power Batch Table
    const powerBatchContainer = document.getElementById('powerBatchTable');
    powerBatchContainer.innerHTML = `
      <table class="data-table">
        <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Timestamp</th><th>Status</th></tr></thead>
        <tbody>
          ${powerBatchLeads.map(s => `
            <tr>
              <td>${escapeHtml(s["Full Name"] || s["name"] || '-')}</td>
              <td>${escapeHtml(s["Email"] || s["email"] || '-')}</td>
              <td>${escapeHtml(s["Phone"] || s["phone"] || '-')}</td>
              <td>${escapeHtml(s["Timestamp"] || s["timestamp"] || '-')}</td>
              <td><span class="status-badge ${(s["Email Sent"] || s["emailSent"]) === 'SENT' ? 'status-sent' : 'status-pending'}">${(s["Email Sent"] || s["emailSent"]) === 'SENT' ? '✓ Sent' : '⏳ Pending'}</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    
    if (vidyapeethLeads.length === 0) vidyapeethContainer.innerHTML = '<p style="text-align:center; padding:1rem; color:#64748b;">No Vidyapeeth leads found</p>';
    if (powerBatchLeads.length === 0) powerBatchContainer.innerHTML = '<p style="text-align:center; padding:1rem; color:#64748b;">No Power Batch leads found</p>';
  }

  function renderAllLeadsTable(leads) {
    const filtered = filterBySearch(filterByDate(leads));
    const tbody = document.getElementById('allLeadsBody');
    tbody.innerHTML = filtered.map(lead => `
      <tr>
        <td>${lead["ID"] || '-'}</td>
        <td>${escapeHtml(lead["Full Name"] || lead["name"] || '-')}</td>
        <td>${escapeHtml(lead["Email"] || lead["email"] || '-')}</td>
        <td>${escapeHtml(lead["Phone"] || lead["phone"] || '-')}</td>
        <td>${escapeHtml(lead["Parent Mobile"] || lead["parentMobile"] || '-')}</td>
        <td><span class="status-badge ${(lead["Mode (Online/Offline)"] || lead["mode"]) === 'online' ? 'status-sent' : 'status-pending'}">${(lead["Mode (Online/Offline)"] || lead["mode"]) === 'online' ? '📱 Online' : '🏛️ Offline'}</span></td>
        <td>${escapeHtml(lead["Course/Target"] || lead["Center Preference"] || lead["course"] || lead["center"] || '-')}</td>
        <td>${escapeHtml(lead["Batch Type"] || lead["batchType"] || '-')}</td>
        <td>${escapeHtml(lead["Timestamp"] || lead["timestamp"] || '-')}</td>
        <td><span class="status-badge ${(lead["Email Sent"] || lead["emailSent"]) === 'SENT' ? 'status-sent' : 'status-pending'}">${(lead["Email Sent"] || lead["emailSent"]) === 'SENT' ? '✓ Sent' : '⏳ Pending'}</span></td>
      </tr>
    `).join('');
    
    if (filtered.length === 0) {
      tbody.innerHTML = '<tr><td colspan="10" style="text-align:center; padding:2rem;">No leads found</td></tr>';
    }
  }

  function escapeHtml(str) {
    if (!str) return '-';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // PDF Export Function
  async function exportToPDF() {
    showToast('Generating PDF report...', 'success');
    
    const reportContainer = document.createElement('div');
    reportContainer.style.padding = '20px';
    reportContainer.style.fontFamily = 'Arial, sans-serif';
    reportContainer.style.backgroundColor = 'white';
    reportContainer.style.color = '#333';
    
    const currentDate = new Date().toLocaleString();
    const filtered = filterBySearch(filterByDate(allLeads));
    
    reportContainer.innerHTML = `
      <div style="text-align: center; margin-bottom: 30px;">
        <h1 style="color: #22c55e;">Physics Wallah - Lead Report</h1>
        <h2>PW Ambassador: Yugal</h2>
        <p>Generated on: ${currentDate}</p>
        <p>Total Leads: ${filtered.length}</p>
      </div>
    `;
    
    // Online Batches Section
    const onlineLeads = filtered.filter(l => (l["Mode (Online/Offline)"] || l["mode"]) === 'online');
    if (onlineLeads.length > 0) {
      const courseGroups = {};
      onlineLeads.forEach(lead => {
        const course = lead["Course/Target"] || lead["course"] || 'Not Specified';
        if (!courseGroups[course]) courseGroups[course] = [];
        courseGroups[course].push(lead);
      });
      
      let onlineHtml = `<h2 style="color: #22c55e;">📱 Online Batches (${onlineLeads.length})</h2>`;
      for (const [course, students] of Object.entries(courseGroups)) {
        onlineHtml += `<h3>${course} (${students.length})</h3><table border="1" cellpadding="8" cellspacing="0" style="width:100%; border-collapse: collapse; margin-bottom: 20px;"><thead><tr style="background:#f0fdf4;"><th>Name</th><th>Email</th><th>Phone</th><th>Timestamp</th></tr></thead><tbody>`;
        students.forEach(s => {
          onlineHtml += `<tr><td>${escapeHtml(s["Full Name"] || s["name"] || '-')}</td><td>${escapeHtml(s["Email"] || s["email"] || '-')}</td><td>${escapeHtml(s["Phone"] || s["phone"] || '-')}</td><td>${escapeHtml(s["Timestamp"] || s["timestamp"] || '-')}</td></tr>`;
        });
        onlineHtml += `</tbody></table>`;
      }
      reportContainer.innerHTML += onlineHtml;
    }
    
    // Offline Batches Section
    const offlineLeads = filtered.filter(l => (l["Mode (Online/Offline)"] || l["mode"]) === 'offline');
    if (offlineLeads.length > 0) {
      const vidyapeethLeads = offlineLeads.filter(l => (l["Batch Type"] || l["batchType"]) === 'vidyapeeth');
      const powerBatchLeads = offlineLeads.filter(l => (l["Batch Type"] || l["batchType"]) === 'powerbatch');
      
      if (vidyapeethLeads.length > 0) {
        reportContainer.innerHTML += `<h2 style="color: #22c55e;">🏛️ Vidyapeeth (${vidyapeethLeads.length})</h2><table border="1" cellpadding="8" cellspacing="0" style="width:100%; border-collapse: collapse; margin-bottom: 20px;"><thead><tr style="background:#f0fdf4;"><th>Name</th><th>Email</th><th>Phone</th><th>Parent Mobile</th><th>Center</th><th>Timestamp</th></tr></thead><tbody>`;
        vidyapeethLeads.forEach(s => {
          reportContainer.innerHTML += `<tr><td>${escapeHtml(s["Full Name"] || s["name"] || '-')}</td><td>${escapeHtml(s["Email"] || s["email"] || '-')}</td><td>${escapeHtml(s["Phone"] || s["phone"] || '-')}</td><td>${escapeHtml(s["Parent Mobile"] || s["parentMobile"] || '-')}</td><td>${escapeHtml(s["Center Preference"] || s["center"] || '-')}</td><td>${escapeHtml(s["Timestamp"] || s["timestamp"] || '-')}</td></tr>`;
        });
        reportContainer.innerHTML += `</tbody></table>`;
      }
      
      if (powerBatchLeads.length > 0) {
        reportContainer.innerHTML += `<h2 style="color: #22c55e;">⚡ Power Batch (${powerBatchLeads.length})</h2><table border="1" cellpadding="8" cellspacing="0" style="width:100%; border-collapse: collapse; margin-bottom: 20px;"><thead><tr style="background:#f0fdf4;"><th>Name</th><th>Email</th><th>Phone</th><th>Timestamp</th></tr></thead><tbody>`;
        powerBatchLeads.forEach(s => {
          reportContainer.innerHTML += `<tr><td>${escapeHtml(s["Full Name"] || s["name"] || '-')}</td><td>${escapeHtml(s["Email"] || s["email"] || '-')}</td><td>${escapeHtml(s["Phone"] || s["phone"] || '-')}</td><td>${escapeHtml(s["Timestamp"] || s["timestamp"] || '-')}</td></tr>`;
        });
        reportContainer.innerHTML += `</tbody></table>`;
      }
    }
    
    const opt = {
      margin: [0.5, 0.5, 0.5, 0.5],
      filename: `PW_Leads_Report_${new Date().toISOString().slice(0,19)}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2, letterRendering: true },
      jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
    };
    
    html2pdf().set(opt).from(reportContainer).save();
    showToast('PDF Report generated successfully!', 'success');
  }

  function exportToCSV() {
    const filtered = filterBySearch(filterByDate(allLeads));
    const headers = ['ID', 'Full Name', 'Email', 'Phone', 'Parent Mobile', 'Mode', 'Course/Center', 'Batch Type', 'Timestamp', 'Email Status'];
    const rows = filtered.map(lead => [
      lead["ID"] || '',
      lead["Full Name"] || lead["name"] || '',
      lead["Email"] || lead["email"] || '',
      lead["Phone"] || lead["phone"] || '',
      lead["Parent Mobile"] || lead["parentMobile"] || '',
      lead["Mode (Online/Offline)"] || lead["mode"] || '',
      lead["Course/Target"] || lead["Center Preference"] || lead["course"] || lead["center"] || '',
      lead["Batch Type"] || lead["batchType"] || '',
      lead["Timestamp"] || lead["timestamp"] || '',
      lead["Email Sent"] || lead["emailSent"] || 'PENDING'
    ]);
    
    const csvContent = [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = `pw_leads_${new Date().toISOString().slice(0,19)}.csv`;
    link.click();
    URL.revokeObjectURL(link.href);
    showToast('CSV exported successfully!', 'success');
  }

  // Tab Switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`${btn.dataset.tab}Tab`).classList.add('active');
    });
  });

  document.getElementById('refreshBtn').addEventListener('click', () => {
    fetchLeads();
    showToast('Data refreshed!', 'success');
  });
  
  document.getElementById('exportPdfBtn').addEventListener('click', exportToPDF);
  document.getElementById('exportCsvBtn').addEventListener('click', exportToCSV);
  document.getElementById('searchInput').addEventListener('input', () => {
    renderStats(allLeads);
    renderOverviewCharts(allLeads);
    renderOnlineTables(allLeads);
    renderOfflineTables(allLeads);
    renderAllLeadsTable(allLeads);
  });
  document.getElementById('dateFrom').addEventListener('change', () => {
    renderStats(allLeads);
    renderOverviewCharts(allLeads);
    renderOnlineTables(allLeads);
    renderOfflineTables(allLeads);
    renderAllLeadsTable(allLeads);
  });
  document.getElementById('dateTo').addEventListener('change', () => {
    renderStats(allLeads);
    renderOverviewCharts(allLeads);
    renderOnlineTables(allLeads);
    renderOfflineTables(allLeads);
    renderAllLeadsTable(allLeads);
  });
  
  // Initial Load
  fetchLeads();
</script>
</body>
</html>
